name: Deploy Mirror (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，如 3.5.3）'
        required: true
        default: '3.5.3'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "v${{ inputs.version }}" \
            --repo ${{ github.repository }} \
            --pattern "GeoDownloader_*" \
            --dir artifacts
          ls -la artifacts/

      - name: Upload and deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          VERSION: ${{ inputs.version }}
        with:
          host: ${{ secrets.MIRROR_HOST }}
          username: ${{ secrets.MIRROR_USER }}
          password: ${{ secrets.MIRROR_PASSWORD }}
          envs: VERSION
          command_timeout: 30m
          script: |
            powershell -Command "
              New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\v$env:VERSION' | Out-Null
              New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\latest' | Out-Null
              New-Item -ItemType Directory -Force -Path 'C:\temp_upload' | Out-Null
              Write-Host 'Directories ready.'
            "

      - name: SCP files to temp directory
        env:
          SSHPASS: ${{ secrets.MIRROR_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          # scp to user home relative path
          for f in artifacts/*; do
            echo "Uploading $(basename $f)..."
            sshpass -e scp -o StrictHostKeyChecking=no \
              "$f" \
              "${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }}:temp_upload/$(basename $f)"
          done
          echo "All files uploaded."

      - name: Move files to final location
        uses: appleboy/ssh-action@v1.0.3
        env:
          VERSION: ${{ inputs.version }}
        with:
          host: ${{ secrets.MIRROR_HOST }}
          username: ${{ secrets.MIRROR_USER }}
          password: ${{ secrets.MIRROR_PASSWORD }}
          envs: VERSION
          script: |
            powershell -Command "
              $version = $env:VERSION
              $src = Join-Path $env:USERPROFILE 'temp_upload'
              $dest = \"C:\nginx-1.30.2\packages\v$version\"
              $latest = 'C:\nginx-1.30.2\packages\latest'

              # Move to versioned directory
              Get-ChildItem $src | ForEach-Object {
                Move-Item $_.FullName -Destination $dest -Force
                Write-Host \"  Moved: $($_.Name)\"
              }

              # Copy to latest
              Remove-Item \"$latest\*\" -Force -ErrorAction SilentlyContinue
              Copy-Item \"$dest\*\" -Destination $latest -Force

              # Cleanup
              Remove-Item $src -Force -Recurse -ErrorAction SilentlyContinue

              Write-Host 'Done. Files in latest:'
              Get-ChildItem $latest | ForEach-Object { Write-Host \"  $($_.Name) ($([math]::Round($_.Length / 1MB, 1)) MB)\" }
            "
