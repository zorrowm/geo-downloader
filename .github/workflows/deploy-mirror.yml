name: Deploy Mirror (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，如 3.5.3）'
        required: true
        default: '3.5.3'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "v${{ inputs.version }}" \
            --repo ${{ github.repository }} \
            --pattern "GeoDownloader_*" \
            --dir artifacts
          ls -la artifacts/

      - name: Create directories and upload
        env:
          SSHPASS: ${{ secrets.MIRROR_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass

          # Create directories via ssh
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }} \
            "powershell -Command \"New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\v${{ inputs.version }}'; New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\latest'\""

          # Upload files directly to versioned directory using absolute path
          for f in artifacts/*; do
            echo "Uploading $(basename $f)..."
            sshpass -e scp -o StrictHostKeyChecking=no \
              "$f" \
              "${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }}:/C:/nginx-1.30.2/packages/v${{ inputs.version }}/$(basename $f)"
          done
          echo "Upload complete."

          # Copy to latest
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }} \
            "powershell -Command \"Remove-Item 'C:\nginx-1.30.2\packages\latest\*' -Force -ErrorAction SilentlyContinue; Copy-Item 'C:\nginx-1.30.2\packages\v${{ inputs.version }}\*' -Destination 'C:\nginx-1.30.2\packages\latest\' -Force; Get-ChildItem 'C:\nginx-1.30.2\packages\latest'\""
