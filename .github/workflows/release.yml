name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        run: cargo tauri build

      - name: Get version
        id: version
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Rename installer
        run: |
          $exeFile = Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          $newName = "GeoDownloader_${{ steps.version.outputs.VERSION }}_x64-setup.exe"
          Rename-Item -Path $exeFile.FullName -NewName $newName
          echo "SETUP_PATH=src-tauri/target/release/bundle/nsis/$newName" >> $env:GITHUB_OUTPUT
        id: rename

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: 'GeoDownloader v${{ steps.version.outputs.VERSION }}'
          generate_release_notes: false
          body: |
            ## v3.0.0 更新
            - 🌐 新增 3D Tiles 下载功能，支持任意 3D Tiles 数据源
            - 📦 框选区域空间过滤，仅下载选区内瓦片
            - 👁️ 下载后支持本地离线预览
            - 🏷️ 产品重命名为 GeoDownloader
          files: |
            ${{ steps.rename.outputs.SETUP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
