name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        run: cargo tauri build

      - name: Get version
        id: version
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Rename installer
        run: |
          $exeFile = Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          $newName = "GeoDownloader_${{ steps.version.outputs.VERSION }}_x64-setup.exe"
          Rename-Item -Path $exeFile.FullName -NewName $newName
          echo "SETUP_PATH=src-tauri/target/release/bundle/nsis/$newName" >> $env:GITHUB_OUTPUT
        id: rename

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: 'GeoDownloader v${{ steps.version.outputs.VERSION }}'
          generate_release_notes: false
          body: |
            ## 主要更新
            - Tauri + Rust 重构，安装包仅 ~6MB
            - 内置 10+ 图源（OSM、ArcGIS、天地图、高德、Google Maps 等）
            - 支持自定义瓦片图源（添加/编辑/删除）
            - 多任务并行下载，独立进度显示
            - 下载历史记录管理
            - GeoTIFF 导出（EPSG:4326 + LZW 压缩）
            - GCJ-02 坐标自动校正
            - 行政区划边界裁剪
            - 软件内自动检查更新

            ## v3.0.0 新增
            - 🌐 Google 3D Tiles 下载（通过 Cesium Ion）
            - 📦 框选区域空间过滤，仅下载选区内瓦片
            - 🔄 子瓦片集递归解析与 session 参数自动传播
            - 👁️ 下载后本地离线预览（URI 自动本地化）
            - 🏷️ 产品重命名为 GeoDownloader
          files: |
            ${{ steps.rename.outputs.SETUP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
