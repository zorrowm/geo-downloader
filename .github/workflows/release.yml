name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        run: cargo tauri build

      - name: Get version
        id: version
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Rename installer
        run: |
          $exeFile = Get-ChildItem -Path src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          $newName = "GeoDownloader_${{ steps.version.outputs.VERSION }}_x64-setup.exe"
          Rename-Item -Path $exeFile.FullName -NewName $newName
          echo "SETUP_PATH=src-tauri/target/release/bundle/nsis/$newName" >> $env:GITHUB_OUTPUT
        id: rename

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: 'GeoDownloader v${{ steps.version.outputs.VERSION }}'
          generate_release_notes: false
          body: |
            ## v${{ steps.version.outputs.VERSION }} 更新
            - 🗺️ 新增 Esri Wayback 历史影像下载（100+ 版本, 2014–2026）
            - 📅 时间轴组件：竖线标记、前进/后退按钮、年份刻度
            - 📦 批量下载：多版本勾选、文件夹保存
            - ✂️ 历史影像按边界裁剪（透明背景）
            - 🔍 最大缩放级别自动探测
            - ↔️ 侧边栏可拖拽调整宽度
            - 🌐 Cesium 3D 球底部经纬度/高度显示
            - 🔧 下载器修复：Esri Referer、404 瓦片跳过
          files: |
            ${{ steps.rename.outputs.SETUP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
