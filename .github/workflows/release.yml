name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: |
          set -e
          # 使用 npm install 代替 npm ci，避免 lockfile 在不同 npm 版本下
          # 对 wasm-only optional deps（@emnapi/runtime、@emnapi/core 等）的处理差异
          # 导致的 EUSAGE Missing 报错。
          for i in 1 2 3; do
            echo "::group::npm install attempt $i"
            npm install --no-audit --no-fund --prefer-offline && [ -d node_modules ] && [ -x node_modules/.bin/vite ] && { echo "::endgroup::"; exit 0; }
            echo "::endgroup::"
            echo "npm install attempt $i failed or produced empty node_modules, retrying..."
            rm -rf node_modules
            sleep 5
          done
          echo "npm install failed after 3 attempts"
          exit 1

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # Windows: 收集 .exe
      - name: Collect Windows artifacts
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exeFile = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          $newName = "GeoDownloader_${{ steps.version.outputs.VERSION }}_windows_x64-setup.exe"
          Copy-Item $exeFile.FullName -Destination $newName
          echo "ARTIFACT=$newName" >> $env:GITHUB_OUTPUT
        id: collect-win

      # macOS: 收集 .dmg
      - name: Collect macOS artifacts
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          ARCH=$([[ "${{ matrix.target }}" == *aarch64* ]] && echo "arm64" || echo "x64")
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          NEW_NAME="GeoDownloader_${{ steps.version.outputs.VERSION }}_macos_${ARCH}.dmg"
          cp "$DMG" "$NEW_NAME"
          echo "ARTIFACT=$NEW_NAME" >> $GITHUB_OUTPUT
        id: collect-mac

      # Linux: 收集 .deb 和 .AppImage
      - name: Collect Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          DEB=$(find src-tauri/target/${{ matrix.target }}/release/bundle/deb -name "*.deb" | head -1)
          APPIMAGE=$(find src-tauri/target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | head -1)
          DEB_NAME="GeoDownloader_${{ steps.version.outputs.VERSION }}_linux_amd64.deb"
          APPIMAGE_NAME="GeoDownloader_${{ steps.version.outputs.VERSION }}_linux_amd64.AppImage"
          cp "$DEB" "$DEB_NAME"
          cp "$APPIMAGE" "$APPIMAGE_NAME"
          echo "DEB=$DEB_NAME" >> $GITHUB_OUTPUT
          echo "APPIMAGE=$APPIMAGE_NAME" >> $GITHUB_OUTPUT
        id: collect-linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: GeoDownloader_*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          # 含 - 后缀（如 -beta.1 / -rc.1 / -alpha.1）识别为预发布版
          if [[ "$VERSION" == *"-"* ]]; then
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: 'GeoDownloader v${{ steps.version.outputs.VERSION }}'
          body_path: 'docs/release-notes/release-notes-v${{ steps.version.outputs.VERSION }}.md'
          prerelease: ${{ steps.version.outputs.PRERELEASE == 'true' }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-mirror:
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: *"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "v${{ steps.version.outputs.VERSION }}" \
            --repo ${{ github.repository }} \
            --pattern "GeoDownloader_*" \
            --dir artifacts
          gh api "repos/${{ github.repository }}/releases/tags/v${{ steps.version.outputs.VERSION }}" \
            | jq --arg base "https://laogao.xyz/packages/latest/" '{
                tag_name,
                html_url,
                body,
                draft,
                prerelease,
                assets: [.assets[] | {
                  name,
                  size,
                  browser_download_url: ($base + .name)
                }]
              }' > artifacts/update.json
          ls -la artifacts/

      - name: Create directories and upload
        env:
          SSHPASS: ${{ secrets.MIRROR_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass

          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }} \
            "powershell -Command \"New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\v${{ steps.version.outputs.VERSION }}'; New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\latest'\""

          for f in artifacts/*; do
            echo "Uploading $(basename $f)..."
            sshpass -e scp -o StrictHostKeyChecking=no \
              "$f" \
              "${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }}:/C:/nginx-1.30.2/packages/v${{ steps.version.outputs.VERSION }}/$(basename $f)"
          done

          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }} \
            "powershell -Command \"Remove-Item 'C:\nginx-1.30.2\packages\latest\*' -Force -ErrorAction SilentlyContinue; Copy-Item 'C:\nginx-1.30.2\packages\v${{ steps.version.outputs.VERSION }}\*' -Destination 'C:\nginx-1.30.2\packages\latest\' -Force\""
